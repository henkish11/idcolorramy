<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile System</title>

<style>

body{
  margin:0;
  font-family:Arial;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  overflow:hidden;
  background:#050507;
}

/* animated background */
body::before, body::after{
  content:"";
  position:absolute;
  width:400px;
  height:400px;
  background:radial-gradient(circle, rgba(255,255,255,0.08), transparent 60%);
  animation:move 12s infinite alternate ease-in-out;
  filter:blur(20px);
}

body::before{top:10%;left:10%;}
body::after{bottom:10%;right:10%;animation-duration:18s;}

@keyframes move{
  from{transform:translate(0,0) scale(1);}
  to{transform:translate(80px,120px) scale(1.2);}
}

.box{
  width:440px;
  background:rgba(20,20,25,0.75);
  padding:25px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 0 40px rgba(0,0,0,0.6);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
  position:relative;
  z-index:2;
}

input{
  width:100%;
  padding:14px;
  margin:10px 0;
  border:none;
  border-radius:12px;
  text-align:center;
  background:rgba(255,255,255,0.05);
  color:#fff;
  outline:none;
}

/* fancy button */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  font-weight:bold;
  background:linear-gradient(135deg,#ffffff,#bdbdbd);
  color:#000;
  transition:0.3s;
  letter-spacing:1px;
}
button:hover{
  transform:scale(1.03);
  box-shadow:0 0 20px rgba(255,255,255,0.2);
}

.avatar{
  width:120px;
  height:120px;
  border-radius:25px;
  margin:10px auto;
  object-fit:cover;
  border:2px solid rgba(255,255,255,0.2);
}

.item{
  background:rgba(255,255,255,0.05);
  padding:12px;
  margin:8px 0;
  border-radius:12px;
  word-break:break-word;
  text-align:left;
}

.label{
  font-size:11px;
  color:#aaa;
  text-transform:uppercase;
}

.value{
  font-size:14px;
  font-weight:bold;
  margin-top:4px;
}

.copy{cursor:pointer;}

.status{
  font-weight:bold;
  padding:4px 10px;
  border-radius:20px;
  display:inline-block;
}

.online{color:#00ff99;background:rgba(0,255,153,0.1);}
.offline{color:#ff4d4d;background:rgba(255,77,77,0.1);}

.hidden{display:none;}

</style>
</head>

<body>

<div class="box">

  <h2>Profile System</h2>

  <input id="userInput" placeholder="Enter ID or Name">
  <button onclick="fetchData()">Search Profile</button>

  <div id="result" class="hidden">

    <img id="avatar" class="avatar">

    <div class="item">
      <div class="label">Full Name</div>
      <div id="fullName" class="value copy" onclick="copyText('fullName')"></div>
    </div>

    <div class="item">
      <div class="label">ID</div>
      <div id="id" class="value"></div>
    </div>

    <div class="item">
      <div class="label">Username</div>
      <div id="username" class="value copy" onclick="copyText('username')"></div>
    </div>

    <div class="item">
      <div class="label">Status</div>
      <div id="status" class="status"></div>
    </div>

    <div class="item">
      <div class="label">Image Link</div>
      <div id="imgLink" class="value copy" onclick="copyText('imgLink')"></div>
    </div>

  </div>

</div>

<script>

function copyText(id){
  navigator.clipboard.writeText(document.getElementById(id).innerText);
}

async function fetchData(){

  let user = document.getElementById("userInput").value.trim();
  if(!user) return;

  let url = `https://pythbots.com/api/xatprofile.php?u=${user}`;
  let proxy = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`;

  try{

    let res = await fetch(proxy);
    let data = await res.json();

    document.getElementById("result").classList.remove("hidden");

    document.getElementById("fullName").innerText = data.name || "N/A";
    document.getElementById("id").innerText = data.id || "N/A";
    document.getElementById("username").innerText = data.username || data.nick || data.name || "N/A";

    // STATUS
    let st = (data.online === true || data.online === "online" || data.status_online == 1);
    let statusEl = document.getElementById("status");

    if(st){
      statusEl.innerText = "ONLINE";
      statusEl.className = "status online";
    }else{
      statusEl.innerText = "OFFLINE";
      statusEl.className = "status offline";
    }

    let avatar = data.avatar || "https://xat.com/images/default_avatar.png";
    document.getElementById("avatar").src = avatar;
    document.getElementById("imgLink").innerText = avatar;

  }catch(e){
    alert("Error loading data");
  }

}

</script>

</body>
</html>
