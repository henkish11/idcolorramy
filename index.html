<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramy Profile | Secure Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050507;
  --glass:rgba(15,15,20,0.85);
  --border:rgba(255,255,255,0.08);
  --green:#10b981;
  --red:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Plus Jakarta Sans',sans-serif;transition:.4s;}
body{
  background:var(--bg);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  overflow:hidden;
}
.container{width:100%;max-width:460px;padding:20px;}

.card{
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:30px;
  padding:40px;
  backdrop-filter:blur(40px);
  box-shadow:0 30px 80px rgba(0,0,0,0.8);
  text-align:center;
}

input{
  width:100%;padding:18px;margin:10px 0;
  border-radius:20px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.03);
  color:#fff;
  text-align:center;
}

button{
  width:100%;padding:18px;
  border-radius:20px;border:none;
  background:#fff;color:#000;
  font-weight:800;cursor:pointer;
  text-transform:uppercase;
}

.hidden{display:none;}
.title{font-size:26px;font-weight:800;margin-bottom:20px;}
.small{font-size:12px;color:#aaa;}

.info{text-align:left;margin-top:20px;}

.item{
  padding:12px;
  border:1px solid var(--border);
  border-radius:15px;
  margin:10px 0;
}

.label{
  font-size:10px;
  color:#888;
  text-transform:uppercase;
}

.value{
  font-size:14px;
  font-weight:600;
}

.status.online{color:var(--green);}
.status.offline{color:var(--red);}

.avatar{
  width:120px;
  height:120px;
  border-radius:35px;
  object-fit:cover;
  border:2px solid var(--border);
  margin:0 auto 15px;
}
</style>
</head>

<body>

<div class="container">

  <!-- APP ONLY (NO LOGIN) -->
  <div id="app" class="card">
    <div class="title">xat Profile System</div>

    <input id="userInput" placeholder="Enter ID or Name">
    <button onclick="fetchData()">Search</button>

    <div id="result" class="info hidden">

      <img id="avatar" class="avatar" src="" alt="avatar">

      <div class="item">
        <div class="label">Beautiful Name</div>
        <div id="name" class="value"></div>
      </div>

      <div class="item">
        <div class="label">ID</div>
        <div id="id" class="value"></div>
      </div>

      <div class="item">
        <div class="label">Status</div>
        <div id="status" class="value"></div>
      </div>

    </div>
  </div>

</div>

<script>
async function fetchData(){
  let user = document.getElementById('userInput').value.trim();
  if(!user) return;

  let url = `https://pythbots.com/api/xatprofile.php?u=${user}`;
  let proxy = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`;

  try{
    let res = await fetch(proxy);
    let data = await res.json();

    document.getElementById('result').classList.remove('hidden');

    document.getElementById('name').innerText = data.name || "N/A";
    document.getElementById('id').innerText = data.id || "N/A";

    let st = data.online ? "ONLINE" : "OFFLINE";
    document.getElementById('status').innerText = st;
    document.getElementById('status').className = 'value status ' + (data.online ? 'online' : 'offline');

    document.getElementById('avatar').src = data.avatar || 'https://xat.com/images/default_avatar.png';

  }catch(e){
    alert('Error loading data');
  }
}
</script>

</body>
</html>
