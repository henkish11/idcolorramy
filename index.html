<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile System</title>

<style>

body{
  margin:0;
  font-family:Arial;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  overflow:hidden;
  background:#050507;
}

/* BACKGROUND IMAGE */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
    url('https://xatimg.com/image/NTKWfOtODi9Z.jpg');
  background-size:cover;
  background-position:center;
  z-index:-2;
}

body::after{
  content:"";
  position:absolute;
  width:420px;
  height:420px;
  background:radial-gradient(circle, rgba(255,255,255,0.08), transparent 60%);
  filter:blur(25px);
  animation:move 14s infinite alternate ease-in-out;
  z-index:-1;
}

@keyframes move{
  from{transform:translate(0,0) scale(1);}
  to{transform:translate(90px,120px) scale(1.2);}
}

/* LOGIN OVERLAY */
#loginScreen{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.85);
  z-index:9999;
}

.login-box{
  width:320px;
  padding:25px;
  background:rgba(20,20,25,0.9);
  border-radius:18px;
  text-align:center;
  border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
}

.login-box input{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  text-align:center;
  outline:none;
}

.login-box button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#fff;
  font-weight:bold;
  cursor:pointer;
}

.box{
  width:520px;
  background:rgba(20,20,25,0.75);
  padding:25px;
  border-radius:22px;
  text-align:center;
  box-shadow:0 0 50px rgba(0,0,0,0.7);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.08);
  position:relative;
  z-index:2;
}

input{
  width:100%;
  padding:14px;
  margin:10px 0;
  border:none;
  border-radius:12px;
  text-align:center;
  background:rgba(255,255,255,0.05);
  color:#fff;
  outline:none;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  font-weight:bold;
  background:linear-gradient(135deg,#ffffff,#cfcfcf);
  color:#000;
  transition:0.3s;
}
button:hover{
  transform:scale(1.03);
  box-shadow:0 0 25px rgba(255,255,255,0.2);
}

.avatar-wrap{
  position:relative;
  width:120px;
  height:120px;
  margin:10px auto;
}

.avatar{
  width:120px;
  height:120px;
  border-radius:28px;
  object-fit:cover;
  border:2px solid rgba(255,255,255,0.2);
}

.status-dot{
  position:absolute;
  width:14px;
  height:14px;
  border-radius:50%;
  bottom:6px;
  right:6px;
  border:2px solid #111;
}

.online-dot{background:#00ff99; box-shadow:0 0 10px #00ff99;}
.offline-dot{background:#ff4d4d; box-shadow:0 0 10px #ff4d4d;}

.item{
  background:rgba(255,255,255,0.05);
  padding:14px 45px 14px 14px;
  margin:10px 0;
  border-radius:14px;
  text-align:left;
  position:relative;
  word-break:break-word;
}

.label{
  font-size:11px;
  color:#aaa;
  text-transform:uppercase;
}

.value{
  font-size:14px;
  font-weight:bold;
  margin-top:4px;
}

.copy-btn{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:16px;
  opacity:0.7;
  transition:0.3s;
}
.copy-btn:hover{
  opacity:1;
  transform:translateY(-50%) scale(1.2);
}

.hidden{display:none;}

</style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <h3>Enter Password</h3>
    <input type="password" id="passInput" placeholder="Password">
    <button onclick="checkPass()">Unlock</button>
  </div>
</div>

<div class="box">

  <h2>Profile System</h2>

  <input id="userInput" placeholder="Enter ID or Name">
  <button onclick="fetchData()">Search Profile</button>

  <div id="result" class="hidden">

    <div class="avatar-wrap">
      <img id="avatar" class="avatar">
      <span id="statusDot" class="status-dot"></span>
    </div>

    <div class="item">
      <div class="label">Full Name</div>
      <div id="fullName" class="value"></div>
      <span class="copy-btn" onclick="copyText('fullName')">📋</span>
    </div>

    <div class="item">
      <div class="label">ID</div>
      <div id="id" class="value"></div>
      <span class="copy-btn" onclick="copyText('id')">📋</span>
    </div>

    <div class="item">
      <div class="label">Username</div>
      <div id="username" class="value"></div>
      <span class="copy-btn" onclick="copyText('username')">📋</span>
    </div>

    <div class="item">
      <div class="label">Image Link</div>
      <div id="imgLink" class="value"></div>
      <span class="copy-btn" onclick="copyText('imgLink')">📋</span>
    </div>

  </div>

</div>

<script>

function checkPass(){
  let pass = document.getElementById("passInput").value;
  if(pass === "111444"){
    document.getElementById("loginScreen").style.display = "none";
  } else {
    alert("Wrong password");
  }
}

function copyText(id){
  navigator.clipboard.writeText(document.getElementById(id).innerText);
}

async function fetchData(){

  let user = document.getElementById("userInput").value.trim();
  if(!user) return;

  let url = `https://pythbots.com/api/xatprofile.php?u=${user}`;
  let proxy = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`;

  try{

    let res = await fetch(proxy);
    let data = await res.json();

    document.getElementById("result").classList.remove("hidden");

    document.getElementById("fullName").innerText = data.name || "N/A";
    document.getElementById("id").innerText = data.id || "N/A";
    document.getElementById("username").innerText = data.username || data.nick || data.name || "N/A";

    let avatar = data.avatar || "https://xat.com/images/default_avatar.png";
    document.getElementById("avatar").src = avatar;
    document.getElementById("imgLink").innerText = avatar;

    let online = (data.online === true || data.online === "online" || data.status_online == 1);
    document.getElementById("statusDot").className = online ? "status-dot online-dot" : "status-dot offline-dot";

  }catch(e){
    alert("Error loading data");
  }

}

</script>

</body>
</html>
