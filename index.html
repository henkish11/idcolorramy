<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile System</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0d0d0f;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.box{
  width:400px;
  background:#15151a;
  padding:20px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 0 20px rgba(0,0,0,0.6);
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  text-align:center;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#fff;
  font-weight:bold;
  cursor:pointer;
}

.avatar{
  width:120px;
  height:120px;
  border-radius:20px;
  margin:10px auto;
  display:block;
}

.item{
  background:#222;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  word-break:break-word;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="box">

  <h2>Profile System</h2>

  <input id="userInput" placeholder="Enter ID">
  <button onclick="fetchData()">Search</button>

  <div id="result" class="hidden">

    <img id="avatar" class="avatar">

    <div class="item">
      <b>Full Name:</b>
      <div id="fullName"></div>
    </div>

    <div class="item">
      <b>ID:</b>
      <div id="id"></div>
    </div>

    <div class="item">
      <b>Status:</b>
      <div id="status"></div>
    </div>

    <div class="item">
      <b>Image Link:</b>
      <div id="imgLink"></div>
    </div>

  </div>

</div>

<script>
async function fetchData(){

  let user = document.getElementById("userInput").value.trim();
  if(!user) return alert("Enter ID");

  let url = `https://pythbots.com/api/xatprofile.php?u=${user}`;
  let proxy = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`;

  try{

    let res = await fetch(proxy);
    let data = await res.json();

    document.getElementById("result").classList.remove("hidden");

    document.getElementById("fullName").innerText =
      data.name || data.fullname || "N/A";

    document.getElementById("id").innerText =
      data.id || "N/A";

    document.getElementById("status").innerText =
      data.online ? "ONLINE" : "OFFLINE";

    let avatar = data.avatar || "https://xat.com/images/default_avatar.png";

    document.getElementById("avatar").src = avatar;
    document.getElementById("imgLink").innerText = avatar;

  } catch(e){
    alert("Error loading data");
    console.log(e);
  }
}
</script>

</body>
</html>
