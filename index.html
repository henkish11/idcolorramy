<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile System</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0d0d0f;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.box{
  width:420px;
  background:#15151a;
  padding:20px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 0 20px rgba(0,0,0,0.6);
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  text-align:center;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#fff;
  font-weight:bold;
  cursor:pointer;
}

.avatar{
  width:120px;
  height:120px;
  border-radius:20px;
  margin:10px auto;
  display:block;
  object-fit:cover;
}

.item{
  background:#222;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  word-break:break-word;
}

.hidden{display:none;}

.label{
  font-size:12px;
  color:#aaa;
}

.value{
  font-size:14px;
  font-weight:bold;
}

.copy{
  cursor:pointer;
}

</style>
</head>

<body>

<div class="box">

  <h2>Profile System</h2>

  <input id="userInput" placeholder="Enter ID or Name">
  <button onclick="fetchData()">Search</button>

  <div id="result" class="hidden">

    <img id="avatar" class="avatar">

    <div class="item">
      <div class="label">Full Name (click to copy)</div>
      <div id="fullName" class="value copy" onclick="copyText('fullName')"></div>
    </div>

    <div class="item">
      <div class="label">ID</div>
      <div id="id" class="value"></div>
    </div>

    <div class="item">
      <div class="label">Name Code (click to copy)</div>
      <div id="nameCode" class="value copy" onclick="copyText('nameCode')"></div>
    </div>

    <div class="item">
      <div class="label">Image Link</div>
      <div id="imgLink" class="value copy" onclick="copyText('imgLink')"></div>
    </div>

  </div>

</div>

<script>

function copyText(id){
  const el = document.getElementById(id);
  if(!el) return;
  navigator.clipboard.writeText(el.innerText);
  alert("Copied");
}

async function fetchData(){

  let user = document.getElementById("userInput").value.trim();

  if(!user){
    alert("Please enter ID or name");
    return;
  }

  let url = `https://pythbots.com/api/xatprofile.php?u=${user}`;
  let proxy = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`;

  try{

    let res = await fetch(proxy);
    let data = await res.json();

    if(!data){
      alert("No data found");
      return;
    }

    document.getElementById("result").classList.remove("hidden");

    let name = data.name || data.fullname || "N/A";
    document.getElementById("fullName").innerText = name;

    document.getElementById("id").innerText = data.id || "N/A";

    // NAME CODE (new)
    let nameCode = data.name_code || data.namecode || data.code || data.name || "N/A";
    document.getElementById("nameCode").innerText = nameCode;

    let avatar = data.avatar || "https://xat.com/images/default_avatar.png";
    document.getElementById("avatar").src = avatar;

    document.getElementById("imgLink").innerText = avatar;

  }catch(err){
    console.error(err);
    alert("Error fetching data. Check API or internet.");
  }

}

</script>

</body>
</html>
